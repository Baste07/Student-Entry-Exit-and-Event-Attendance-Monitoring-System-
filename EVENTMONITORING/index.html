<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring System</title>
    <link rel="stylesheet" href="shared/global.css">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.25rem;
            background: linear-gradient(135deg, rgba(10, 36, 54, 0.96) 0%, rgba(25, 118, 184, 0.82) 100%), url('auth/assets/ElTresEresCenciaEscuelaLogo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            font-family: var(--font-body);
        }

        .doorway {
            width: min(92vw, 28rem);
            padding: 2.25rem 2rem;
            border-radius: 1.35rem;
            background: rgba(255, 255, 255, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.28);
            box-shadow: 0 16px 44px rgba(7, 28, 42, 0.18);
            text-align: center;
            backdrop-filter: blur(12px);
        }

        .crest {
            width: 200px;
            height: 200px;
            margin: 0 auto 1.15rem;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: var(--surface);
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.16);
        }

        .crest img {
            width: 150px;
            height: 150px;
            object-fit: contain;
        }

        .doorway h1 {
            margin: 0 0 .35rem;
            font-family: var(--font-heading);
            font-size: 1.45rem;
            letter-spacing: .01em;
        }

        .doorway p {
            margin: 0 0 1.25rem;
            color: rgba(255, 255, 255, 0.8);
            font-size: .95rem;
        }

        .loader-dots {
            display: inline-flex;
            gap: .45rem;
            align-items: center;
            justify-content: center;
            margin-top: .2rem;
        }

        .loader-dots span {
            width: .6rem;
            height: .6rem;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.45);
            animation: dotPulse 1.1s ease-in-out infinite;
        }

        .loader-dots span:nth-child(2) { animation-delay: .2s; }
        .loader-dots span:nth-child(3) { animation-delay: .4s; }

        .loader-dots span.active {
            background: var(--yellow);
            animation-duration: .85s;
        }

        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.75); opacity: .55; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="doorway" role="status" aria-live="polite">
        <div class="crest">
            <img src="auth/assets/ElTresEresCenciaEscuelaLogo.png" alt="School crest">
        </div>
        <h1>El Tres Eres Ciencia Escuela</h1>
        <p>Preparing your monitoring workspace…</p>
        <div class="loader-dots" aria-hidden="true">
            <span class="active"></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <script>
        window.setTimeout(() => {
            window.location.replace('auth/login.html');
        }, 3000);
    </script>
</body>
</html>
