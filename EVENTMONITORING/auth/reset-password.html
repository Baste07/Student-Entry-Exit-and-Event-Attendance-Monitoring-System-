<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reset Password · SAMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../auth/login.css">
</head>
<body>

<div class="login-card">

    <div class="logos">
        <img src="../auth/assets/plplogo.png" alt="PLP Logo" class="plp-logo"/>
    </div>

    <h1 class="card-title">Set New Password</h1>
    <p class="card-subtitle">Enter your new password below</p>

    <div id="status-alert" class="d-none" role="alert"
         style="border-radius:10px; padding:12px 16px; font-size:13.5px; display:flex; align-items:flex-start; gap:10px; margin-bottom:16px;">
        <svg id="status-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0; margin-top:1px;">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="status-message"></span>
    </div>

    <div class="mb-field">
        <label class="form-label" for="newPassword">New Password</label>
        <div class="input-wrapper">
            <input type="password" id="newPassword" class="form-control"
                   placeholder="Minimum 8 characters" minlength="8"/>
            <svg class="input-icon" id="toggle-new" width="16" height="16" fill="none"
                 stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
                 style="pointer-events:all;cursor:pointer;"
                 onclick="toggleField('newPassword','toggle-new')">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        </div>
    </div>

    <div class="mb-field">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <div class="input-wrapper">
            <input type="password" id="confirmPassword" class="form-control"
                   placeholder="Re-enter new password"/>
            <svg class="input-icon" id="toggle-confirm" width="16" height="16" fill="none"
                 stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
                 style="pointer-events:all;cursor:pointer;"
                 onclick="toggleField('confirmPassword','toggle-confirm')">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        </div>
    </div>

    <button class="btn-signin" id="resetBtn">Update Password</button>

    <p class="register-link"><a href="../auth/login.html">← Back to Login</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../config/.env.js"></script>
<script src="../config/config.js"></script>
<script src="reset-password.js"></script>
</body>
</html>
