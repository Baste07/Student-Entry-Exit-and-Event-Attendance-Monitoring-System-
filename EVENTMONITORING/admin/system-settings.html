<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" type="image/png" href="../auth/assets/ElTresEresCenciaEscuelaLogo.png">
    <title>System Settings — Smart Academic Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../shared/global.css"/>
    <link rel="stylesheet" href="../Gemma/gemma.css"/>
    <link rel="stylesheet" href="admin-specific.css"/>
    <link rel="stylesheet" href="system-settings.css"/>
</head>
<body>

<div id="header-container"></div>
<div id="sidebar-container"></div>

<main class="main-content">

    <div class="page-header anim anim-1" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
        <div>
            <h1>System Settings</h1>
            <p>Configure global system settings and preferences</p>
        </div>
    </div>

    <div class="settings-container anim anim-2">
        <div class="settings-section">
            <div class="settings-header">
                <h2>Academic Calendar</h2>
                <p>Manage school years and set the active year used across all modules</p>
            </div>

            <div class="settings-form">

                <!-- Active Year Banner -->
                <div id="activeSchoolYearBanner" class="active-semester-banner" style="display:none;">
                    <span class="banner-badge">ACTIVE</span>
                    <span id="activeSchoolYearLabel"></span>
                </div>

                <!-- Tabs -->
                <div class="calendar-tabs">
                    <button type="button" class="cal-tab active" id="tabSetActive" data-tab="setActive">
                        Set Active School Year
                    </button>
                    <button type="button" class="cal-tab" id="tabCreateNew" data-tab="create">
                        Create New School Year
                    </button>
                </div>

                <!-- Tab Panel: Set Active -->
                <div id="panelSetActive">
                    <div class="form-group">
                        <label for="existingSchoolYearSelect" class="form-label">Select School Year to Activate</label>
                        <select class="form-control" id="existingSchoolYearSelect">
                            <option value="" disabled selected>Loading school years...</option>
                        </select>
                        <small class="form-text text-muted" style="margin-top:0.4rem;">
                            This school year will be used by all modules (imports, enrollment, records, etc.)
                        </small>
                    </div>

                    <div class="semester-preview" id="syDetailsCard" style="display:none;">
                        <div class="row">
                            <div class="col-4">
                                <span class="preview-label">Start Date</span>
                                <span class="preview-value" id="syDetailStart">—</span>
                            </div>
                            <div class="col-4">
                                <span class="preview-label">End Date</span>
                                <span class="preview-value" id="syDetailEnd">—</span>
                            </div>
                            <div class="col-4">
                                <span class="preview-label">Status</span>
                                <span class="status-badge" id="syDetailStatus">—</span>
                            </div>
                        </div>
                    </div>

                    <div style="display:flex; gap:0.75rem;">
                        <button class="btn btn-primary" id="setActiveSchoolYearBtn" type="button" disabled>
                            Activate School Year
                        </button>
                        <button class="btn btn-secondary" id="inactivateSchoolYearBtn" type="button" disabled>
                            Inactivate School Year
                        </button>
                    </div>
                </div>

                <!-- Tab Panel: Create New -->
                <div id="panelCreate" style="display:none;">
                    <div class="form-group" style="max-width:360px;">
                        <label for="schoolYearInput" class="form-label">School Year</label>
                        <input type="text" class="form-control" id="schoolYearInput" placeholder="e.g., 2027-2028"/>
                        <small class="form-text text-muted">Use format YYYY-YYYY</small>
                    </div>

                    <div class="form-group activate-on-create-row">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="activateOnCreate" checked/>
                            <label class="form-check-label" for="activateOnCreate">Set as active school year immediately</label>
                        </div>
                    </div>

                    <button class="btn btn-primary" id="createSchoolYearBtn">Save School Year</button>
                </div>

            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../config/.env.js"></script>
<script src="../config/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared/global.js"></script>
<script src="admin-specific.js"></script>
<script src="system-settings.js?v=20260707b"></script>

<script>
    requireSuperAdmin();
    loadHeader();
    loadSidebar('system-settings');
</script>

</body>
</html>
