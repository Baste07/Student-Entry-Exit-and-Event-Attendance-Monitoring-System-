<link rel="stylesheet" href="../shared/global.css">
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<header>
    <div class="top-left">
        <div class="top-left-logos">
            <img src="../resc/assets/el tres eres cencia escuela.jpg" alt="El Tres Eres Ciencia Escuela Logo">
        </div>
        <div class="top-left-divider"></div>
        <div class="top-left-text">
            <h2>School Attendance System</h2>
            <p id="header-panel-label">Admin Panel</p>
        </div>
    </div>

    <div class="header-time">
        <span class="time-display" id="manilaTime">--:--:--</span>
        <div class="time-meta">
            <i class="fa-regular fa-calendar"></i>
            <span id="manilaDate">--- --, ----</span>
        </div>
    </div>

    <div class="header-right">
        <a href="../students/takeAttendance.html" class="header-attendance-btn">
            <i class="fa-solid fa-camera-retro"></i> Take Attendance
        </a>
        <a href="../students/homepage.html" class="header-home-btn">
            <i class="fa-solid fa-house"></i> Go to Homepage
        </a>
        <button class="header-logout" onclick="logout()">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Log Out
        </button>
    </div>
</header>
