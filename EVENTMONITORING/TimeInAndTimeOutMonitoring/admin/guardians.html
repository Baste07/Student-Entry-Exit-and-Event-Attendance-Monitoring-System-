<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardians Management | K-10 Attendance System</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Nunito+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Shared component styles -->
    <link rel="stylesheet" href="../resc/css/header.css">
    <link rel="stylesheet" href="../resc/css/nav.css">

    <!-- Page-specific styles -->
    <link rel="stylesheet" href="../resc/css/guardians.css">
<base target="_blank">
</head>
<body>

    <div id="header-container"></div>
    <div id="sidebar-container"></div>

    <main class="main-content">
        <div class="container">

            <div class="page-header">
                <div class="header-titles">
                    <h1><i class="fa-solid fa-user-shield"></i> Guardians Management</h1>
                    <p>View guardian records and their linked students</p>
                </div>

                <div class="stats-badges">
                    <span class="stat-badge total"><i class="fa-solid fa-user-shield"></i> <span id="badgeTotal">0</span> Guardians</span>
                    <span class="stat-badge active"><i class="fa-solid fa-link"></i> <span id="badgeLinked">0</span> Linked Students</span>
                </div>
            </div>
            <hr>

            <!-- Filters -->
            <div class="controls-card">
                <div class="controls-header">
                    <h2><i class="fa-solid fa-sliders-h"></i> Filters &amp; Search</h2>
                </div>
                <div class="table-controls">
                    <div class="control-group">
                        <label for="searchInput"><i class="fa-solid fa-magnifying-glass"></i> Search</label>
                        <input type="text" id="searchInput" placeholder="Search by name or phone number" />
                    </div>
                    <div class="control-group">
                        <label for="relationshipFilter"><i class="fa-solid fa-people-arrows"></i> Filter by Relationship</label>
                        <select id="relationshipFilter">
                            <option value="">All Relationships</option>
                            <option value="mother">Mother</option>
                            <option value="father">Father</option>
                            <option value="legal_guardian">Legal Guardian</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="control-group" style="display:flex; align-items:flex-end;">
                        <button id="clearFilters" class="btn btn-clear">
                            <i class="fa-solid fa-eraser"></i> Clear Filters
                        </button>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Last Name</th>
                            <th>First Name</th>
                            <th>Middle Name</th>
                            <th>Relationship</th>
                            <th>Phone Number</th>
                            <th>Alt. Phone</th>
                            <th>Email</th>
                            <th>Address</th>
                            <th>Linked Students</th>
                        </tr>
                    </thead>
                    <tbody id="guardiansTableBody">
                        <tr id="loadingRow">
                            <td colspan="9" class="loading-cell">
                                <i class="fa-solid fa-spinner fa-spin"></i> Loading guardians...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>

    <!-- ══ VIEW LINKED STUDENTS MODAL ══ -->
    <div id="viewStudentsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fa-solid fa-users"></i> Linked Students</h2>
                <button class="close-modal" onclick="closeViewModal()">&times;</button>
            </div>
            <ul class="link-list" id="linkedStudentsList"></ul>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toastMsg">Done!</span>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../config/.env.js"></script>
    <script src="../../config/config.js"></script>

    <!-- Shared header + sidebar loader -->
    <script src="../includes/sidebar.js"></script>

    <!-- Page logic -->
    <script src="../resc/js/guardians.js"></script>

    <script>
        loadHeader();
        loadSidebar('guardians');
    </script>
</body>
</html>
