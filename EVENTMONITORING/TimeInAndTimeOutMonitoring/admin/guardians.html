<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardians Management | Laboratory Attendance System</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Shared component styles -->
    <link rel="stylesheet" href="../shared/global.css">
    <link rel="stylesheet" href="../resc/css/header.css">
    <link rel="stylesheet" href="../resc/css/nav.css">

    <!-- Page-specific styles -->
    <link rel="stylesheet" href="../resc/css/guardians.css">
</head>
<body>

    <div id="header-container"></div>
    <div id="sidebar-container"></div>

    <main class="main-content">
        <div class="container">

            <div class="page-header">
                <div class="header-titles">
                    <h1><i class="fa-solid fa-user-shield"></i> Guardians Management</h1>
                    <p>Manage guardian records and their linked students</p>
                </div>

                <div class="stats-badges">
                    <span class="stat-badge total"><i class="fa-solid fa-user-shield"></i> <span id="badgeTotal">0</span> Guardians</span>
                    <span class="stat-badge active"><i class="fa-solid fa-link"></i> <span id="badgeLinked">0</span> Linked Students</span>
                </div>

                <button class="btn-add" onclick="openAddModal()">
                    <i class="fa-solid fa-plus"></i> Add Guardian
                </button>
            </div>
            <hr>

            <!-- Filters -->
            <div class="controls-card">
                <div class="controls-header">
                    <h2><i class="fa-solid fa-sliders-h"></i> Filters &amp; Search</h2>
                </div>
                <div class="table-controls">
                    <div class="control-group">
                        <label for="searchInput"><i class="fa-solid fa-magnifying-glass"></i> Search</label>
                        <input type="text" id="searchInput" placeholder="Search by name or phone number" />
                    </div>
                    <div class="control-group">
                        <label for="relationshipFilter"><i class="fa-solid fa-people-arrows"></i> Filter by Relationship</label>
                        <select id="relationshipFilter">
                            <option value="">All Relationships</option>
                        </select>
                    </div>
                    <div class="control-group" style="display:flex; align-items:flex-end;">
                        <button id="clearFilters" class="btn btn-clear">
                            <i class="fa-solid fa-eraser"></i> Clear Filters
                        </button>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Last Name</th>
                            <th>First Name</th>
                            <th>Relationship</th>
                            <th>Phone Number</th>
                            <th>Email</th>
                            <th>Address</th>
                            <th>Linked Students</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="guardiansTableBody">
                        <tr id="loadingRow">
                            <td colspan="8" class="loading-cell">
                                <i class="fa-solid fa-spinner fa-spin"></i> Loading guardians...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>

    <!-- ══ ADD / EDIT MODAL ══ -->
    <div id="guardianModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"><i class="fa-solid fa-plus"></i> Add Guardian</h2>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <form id="guardianForm">
                <input type="hidden" id="guardianId">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name <span class="required">*</span></label>
                        <input type="text" id="firstName" required placeholder="e.g., Maria">
                    </div>
                    <div class="form-group">
                        <label>Middle Name</label>
                        <input type="text" id="middleName" placeholder="Optional">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Last Name <span class="required">*</span></label>
                        <input type="text" id="lastName" required placeholder="e.g., Santos">
                    </div>
                    <div class="form-group">
                        <label>Relationship <span class="required">*</span></label>
                        <select id="relationship" required>
                            <option value="" disabled selected>-- Select --</option>
                            <option value="Mother">Mother</option>
                            <option value="Father">Father</option>
                            <option value="Grandmother">Grandmother</option>
                            <option value="Grandfather">Grandfather</option>
                            <option value="Guardian">Guardian</option>
                            <option value="Sibling">Sibling</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Phone Number <span class="required">*</span></label>
                        <input type="text" id="phoneNumber" required placeholder="e.g., 09171234567">
                    </div>
                    <div class="form-group">
                        <label>Alternate Phone Number</label>
                        <input type="text" id="alternatePhoneNumber" placeholder="Optional">
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Optional">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <textarea id="address" placeholder="Optional"></textarea>
                </div>
                <button type="submit" class="btn-submit" style="width:100%">
                    <i class="fa-solid fa-save"></i> <span id="submitBtnText">Add Guardian</span>
                </button>
            </form>
        </div>
    </div>

    <!-- ══ VIEW LINKED STUDENTS MODAL ══ -->
    <div id="viewStudentsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fa-solid fa-users"></i> Linked Students</h2>
                <button class="close-modal" onclick="closeViewModal()">&times;</button>
            </div>
            <ul class="link-list" id="linkedStudentsList"></ul>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toastMsg">Done!</span>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../config/.env.js"></script>
    <script src="../../config/config.js"></script>

    <!-- Shared header + sidebar loader -->
    <script src="../includes/sidebar.js"></script>

    <!-- Page logic -->
    <script src="../resc/js/guardians.js"></script>

    <script>
        loadHeader();
        loadSidebar('guardians');
    </script>
</body>
</html>
