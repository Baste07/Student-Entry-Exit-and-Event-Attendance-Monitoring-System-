<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachers Management | K-10 Attendance System</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Nunito+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Shared component styles -->
    <link rel="stylesheet" href="../resc/css/header.css">
    <link rel="stylesheet" href="../resc/css/nav.css">

    <!-- Page-specific styles -->
    <link rel="stylesheet" href="../resc/css/teachers.css">
    <link rel="icon" type="image/png" sizes="any" href="../../auth/assets/ElTresEresCenciaEscuelaLogo.png">
<link rel="shortcut icon" href="../../auth/assets/ElTresEresCenciaEscuelaLogo.png">

</head>
<body>

    <!-- Shared header injected by sidebar.js -->
    <div id="header-container"></div>

    <!-- Shared sidebar injected by sidebar.js -->
    <div id="sidebar-container"></div>

    <main class="main-content">
        <div class="container">

            <div class="page-header">
                <div class="header-titles">
                    <h1><i class="fa-solid fa-chalkboard-user"></i> Teachers Management</h1>
                    <p>View teacher records, employee IDs, and faculty assignments</p>
                </div>

                <div class="stats-badges">
                    <span class="stat-badge total"><i class="fa-solid fa-chalkboard-user"></i> <span id="badgeTotal">0</span> Total</span>
                    <span class="stat-badge active"><i class="fa-solid fa-circle-check"></i> <span id="badgeActive">0</span> Active</span>
                    <span class="stat-badge inactive"><i class="fa-solid fa-circle-xmark"></i> <span id="badgeInactive">0</span> Inactive</span>
                </div>
            </div>
            <hr>

            <!-- Filters -->
            <div class="controls-card">
                <div class="controls-header">
                    <h2><i class="fa-solid fa-sliders-h"></i> Filters &amp; Search</h2>
                </div>
                <div class="table-controls">
                    <div class="control-group">
                        <label for="searchInput"><i class="fa-solid fa-magnifying-glass"></i> Search</label>
                        <input type="text" id="searchInput" placeholder="Search by employee ID or name" />
                    </div>
                    <div class="control-group">
                        <label for="facultyFilter"><i class="fa-solid fa-building"></i> Filter by Faculty</label>
                        <select id="facultyFilter">
                            <option value="">All Faculties</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="statusFilter"><i class="fa-solid fa-filter"></i> Filter by Status</label>
                        <select id="statusFilter">
                            <option value="">All Status</option>
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                    <div class="control-group" style="display:flex; align-items:flex-end;">
                        <button id="clearFilters" class="btn btn-clear">
                            <i class="fa-solid fa-eraser"></i> Clear Filters
                        </button>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Employee ID</th>
                            <th>Last Name</th>
                            <th>First Name</th>
                            <th>Middle Name</th>
                            <th>Suffix</th>
                            <th>Faculty</th>
                            <th>Phone Number</th>
                            <th>Email</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="teachersTableBody">
                        <tr id="loadingRow">
                            <td colspan="9" class="loading-cell">
                                <i class="fa-solid fa-spinner fa-spin"></i> Loading teachers...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toastMsg">Done!</span>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../config/.env.js"></script>
    <script src="../../config/config.js"></script>

    <!-- Shared header + sidebar loader -->
    <script src="../includes/sidebar.js"></script>

    <!-- Page logic -->
    <script src="../resc/js/teachers.js"></script>

    <script>
        loadHeader();
        loadSidebar('teachers');
    </script>
</body>
</html>
