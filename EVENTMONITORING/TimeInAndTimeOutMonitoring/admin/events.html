<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events Management | Laboratory Attendance System</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Shared component styles -->
    <link rel="stylesheet" href="../shared/global.css">
    <link rel="stylesheet" href="../resc/css/header.css">
    <link rel="stylesheet" href="../resc/css/nav.css">

    <!-- Page-specific styles -->
    <link rel="stylesheet" href="../resc/css/events.css">
</head>
<body>

    <div id="header-container"></div>
    <div id="sidebar-container"></div>

    <main class="main-content">
        <div class="container">

            <div class="page-header">
                <div class="header-titles">
                    <h1><i class="fa-solid fa-calendar-day"></i> Events Management</h1>
                    <p>Create and manage school events, assemblies, and activities</p>
                </div>

                <div class="stats-badges">
                    <span class="stat-badge total"><i class="fa-solid fa-calendar"></i> <span id="badgeTotal">0</span> Total</span>
                    <span class="stat-badge active"><i class="fa-solid fa-calendar-check"></i> <span id="badgeUpcoming">0</span> Upcoming</span>
                    <span class="stat-badge inactive"><i class="fa-solid fa-calendar-xmark"></i> <span id="badgePast">0</span> Past</span>
                </div>

                <button class="btn-add" onclick="openAddModal()">
                    <i class="fa-solid fa-plus"></i> Add Event
                </button>
            </div>
            <hr>

            <!-- Filters -->
            <div class="controls-card">
                <div class="controls-header">
                    <h2><i class="fa-solid fa-sliders-h"></i> Filters &amp; Search</h2>
                </div>
                <div class="table-controls">
                    <div class="control-group">
                        <label for="searchInput"><i class="fa-solid fa-magnifying-glass"></i> Search</label>
                        <input type="text" id="searchInput" placeholder="Search by event name or location" />
                    </div>
                    <div class="control-group">
                        <label for="typeFilter"><i class="fa-solid fa-tag"></i> Filter by Type</label>
                        <select id="typeFilter">
                            <option value="">All Types</option>
                            <option value="assembly">Assembly</option>
                            <option value="meeting">Meeting</option>
                            <option value="sports">Sports</option>
                            <option value="ceremony">Ceremony</option>
                            <option value="exam">Exam</option>
                            <option value="holiday">Holiday</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="statusFilter"><i class="fa-solid fa-filter"></i> Filter by Status</label>
                        <select id="statusFilter">
                            <option value="">All Status</option>
                            <option value="upcoming">Upcoming</option>
                            <option value="ongoing">Ongoing</option>
                            <option value="completed">Completed</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                    </div>
                    <div class="control-group" style="display:flex; align-items:flex-end;">
                        <button id="clearFilters" class="btn btn-clear">
                            <i class="fa-solid fa-eraser"></i> Clear Filters
                        </button>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Event Name</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Type</th>
                            <th>Location</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="eventsTableBody">
                        <tr id="loadingRow">
                            <td colspan="7" class="loading-cell">
                                <i class="fa-solid fa-spinner fa-spin"></i> Loading events...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>

    <!-- ══ ADD / EDIT MODAL ══ -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"><i class="fa-solid fa-plus"></i> Add Event</h2>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <form id="eventForm">
                <input type="hidden" id="eventId">
                <div class="form-group">
                    <label>Event Name <span class="required">*</span></label>
                    <input type="text" id="eventName" required placeholder="e.g., Foundation Day">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Event Date <span class="required">*</span></label>
                        <input type="date" id="eventDate" required>
                    </div>
                    <div class="form-group">
                        <label>Event Type <span class="required">*</span></label>
                        <select id="eventType" required>
                            <option value="" disabled selected>-- Select --</option>
                            <option value="assembly">Assembly</option>
                            <option value="meeting">Meeting</option>
                            <option value="sports">Sports</option>
                            <option value="ceremony">Ceremony</option>
                            <option value="exam">Exam</option>
                            <option value="holiday">Holiday</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Start Time</label>
                        <input type="time" id="timeStart">
                    </div>
                    <div class="form-group">
                        <label>End Time</label>
                        <input type="time" id="timeEnd">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="location" placeholder="e.g., Covered Court">
                    </div>
                    <div class="form-group">
                        <label>Status <span class="required">*</span></label>
                        <select id="status" required>
                            <option value="upcoming">Upcoming</option>
                            <option value="ongoing">Ongoing</option>
                            <option value="completed">Completed</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" placeholder="Optional: Enter event details"></textarea>
                </div>
                <button type="submit" class="btn-submit" style="width:100%">
                    <i class="fa-solid fa-save"></i> <span id="submitBtnText">Add Event</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toastMsg">Done!</span>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../config/.env.js"></script>
    <script src="../../config/config.js"></script>

    <!-- Shared header + sidebar loader -->
    <script src="../includes/sidebar.js"></script>

    <!-- Page logic -->
    <script src="../resc/js/events.js"></script>

    <script>
        loadHeader();
        loadSidebar('events');
    </script>
</body>
</html>
